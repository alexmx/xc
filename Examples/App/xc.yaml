# xc configuration for SampleApp
# A guided tour of the full xc.yaml surface. Workspace generated by tuist.
#
# Root fields: `workspace` (or `project` — mutually exclusive), `destinations`,
# `defaults`, `commands` (required), `settings`.

workspace: SampleApp.xcworkspace
# project: SampleApp.xcodeproj   # use instead of `workspace` for a bare project

# Named destinations: short aliases for long `-destination` strings.
# `${VAR:-default}` expands from the environment with a fallback.
destinations:
  sim: "platform=iOS Simulator,name=${IOS_SIMULATOR:-iPhone 17 Pro}"
  sim-ipad: "platform=iOS Simulator,name=iPad Pro 13-inch (M5)"
  mac: "platform=macOS"

# Defaults apply to every command (it accepts any command field).
defaults:
  scheme: SampleApp
  configuration: Debug
  destination: sim
  derived-data-path: "${DERIVED_DATA:-./DerivedData}"

# Project-level settings (override the global ~/.config/xc/config.yaml).
settings:
  formatter: xcbeautify   # or "xcbeautify --disable-logging", xcpretty, raw
  verbose: false

commands:
  # Plain commands: the command name IS the xcodebuild action (build, test,
  # clean, archive, analyze, build-for-testing, ...).
  build:
    xcconfig: "Config/Shared.xcconfig"     # extra build settings via -xcconfig
    hooks:
      pre: "tuist generate --no-open"       # runs before the build
      post: "echo 'build done'"             # runs after a successful build
    variants:
      # A variant inherits its command and overrides only what it names.
      release:
        configuration: Release
        hooks:
          pre: "tuist generate --no-open"   # variant hooks override the command's
      ipad:
        destination: sim-ipad
      core:
        scheme: Core
      quick:
        hooks: {}                           # `hooks: {}` disables inherited hooks

  test:
    scheme: SampleAppTests
    destination:                            # a list runs tests on every destination
      - sim
      - sim-ipad
    variants:
      core:
        scheme: CoreTests
      plan:
        test-plan: SmokeTests               # requires a test plan wired into the scheme
      ci:
        result-bundle-path: "${RESULT_BUNDLE_PATH:-./build/tests.xcresult}"
        extra-args:                         # appended verbatim to xcodebuild
          - "-enableCodeCoverage"
          - "YES"

  # build-for-testing + test-without-building: compile once, then re-run tests
  # without recompiling (faster reruns, or split build/test across CI stages).
  build-for-testing:
    scheme: SampleAppTests
  test-without-building:
    scheme: SampleAppTests

  analyze: {}                               # → xcodebuild analyze

  clean: {}                                 # empty command = just the defaults

  archive:
    configuration: Release
    xcconfig: "Config/Shared.xcconfig"
    archive-path: "${BUILD_DIR:-./build}/SampleApp.xcarchive"

  # Script commands: a `run` field runs shell instead of xcodebuild. They still
  # support hooks, variants, extra-args, and --dry-run.
  lint:
    run: "swiftlint lint --quiet"
    variants:
      fix:
        run: "swiftlint lint --fix"

  format:
    run: "swiftformat Sources Tests"
